<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Your Account - Money Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #1f2937;
    }
    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      transition: border 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #5568d3;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .features {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      color: #6b7280;
      font-size: 14px;
    }
    .check {
      color: #10b981;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 Money Coach</h1>
    <p>Connect your account to unlock AI-powered spending insights via text message.</p>

    <form id="connectForm">
      <input
        type="tel"
        id="phone"
        placeholder="+1 (555) 123-4567"
        required
        pattern="[\+]?[0-9]{10,15}"
      >
      <button type="submit">Connect Account</button>
    </form>

    <div class="features">
      <div class="feature">
        <span class="check">✓</span>
        <span>Spending anomaly detection</span>
      </div>
      <div class="feature">
        <span class="check">✓</span>
        <span>Find cheaper alternatives nearby</span>
      </div>
      <div class="feature">
        <span class="check">✓</span>
        <span>Receipt Q&A via text</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/knotapi-js@1.0.6"></script>
  <script>
    document.getElementById('connectForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Connecting...';

      const phone = document.getElementById('phone').value.trim();

      try {
        const res = await fetch('/auth/knot/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();

        if (!res.ok || !data.session) {
          alert(`Failed to create session: ${data.error || JSON.stringify(data)}`);
          btn.disabled = false;
          btn.textContent = 'Connect Account';
          return;
        }

        const { session } = data;
        console.log('Session created:', session);

        const KnotapiJS = window.KnotapiJS.default;
        const knotapi = new KnotapiJS();

        const [cfg, merchants] = await Promise.all([
          fetch('/config').then(r => r.json()),
          fetch('/transactions/merchants').then(r => r.json())
        ]);
        knotapi.open({
          sessionId: session,
          clientId: cfg.knotClientId,
          environment: 'development',
          entryPoint: 'onboarding',
          merchantIds: [44],
          onEvent: (event, merchant, payload) => console.log('Knot event:', event, merchant, payload),
          onSuccess: () => alert('Account connected! You can now receive SMS insights.'),
          onError: (code, msg) => {
            console.error('Knot onError:', code, msg);
            alert(`Knot error: ${JSON.stringify(code)}`);
          },
          onExit: () => { btn.disabled = false; btn.textContent = 'Connect Account'; }
        });
      } catch (err) {
        alert('Failed to start session. Is the server running?');
        btn.disabled = false;
        btn.textContent = 'Connect Account';
      }
    });
  </script>
</body>
</html>
